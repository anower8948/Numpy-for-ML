name : ML CI Pipeline

on: 
  push:
    branches: ["main"]


jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check README exists 
        run: |
          if [ ! -f README.md ]; then
            echo "README Missing"
            exit 1
          fi
      
      - name : Check if readme is exmpty
        run: |
          if [ ! -s README.md ]; then
            echo " Readme is empty "
            exit 1
          fi

      - name: Check python File exist
        run: |
          for file in *.py; do
            if [ ! -s "$file" ]; then
              echo "$file is empty ❌"
              exit 1
            fi
          done

      - name: Check Python syntax
        run: |
          for file in *.py; do
            python3 -m py_compile "$file" || exit 1
          done

      - name: CI Passed
        run: echo "All checks passed ✅"